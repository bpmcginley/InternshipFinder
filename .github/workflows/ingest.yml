name: Ingest internships

# Runs the scraper on a schedule and commits fresh data for the Pages site.
on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours (UTC)
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/ingest.yml"]

permissions:
  contents: write               # allow committing the data back

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run ingester and export static JSON
        working-directory: backend
        env:
          INTERNSCOUT_DB: ${{ github.workspace }}/internscout.db
          # Offline metro gazetteer (Boston + NYC/Chicago/Miami) keeps runs fast & reliable.
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}   # optional: enables Google Jobs search layer
        run: |
          python -m internscout.run_ingest --export "${{ github.workspace }}/docs/data"

      - name: Commit updated data
        run: |
          git config user.name  "internscout-bot"
          git config user.email "actions@github.com"
          git add docs/data/listings.json docs/data/stats.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh listings ($(date -u +%FT%TZ))"
            git push
          fi
